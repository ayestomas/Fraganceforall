    <header class="header">
        <a href="/index.html" class="logo">
            <img src="../assets/logofoa.png" alt="Logotipo">
        </a>
        <h1 class="header-title">The Beautifull Parfume</h1>
        
        <button class="menu-toggle" aria-label="Abrir menú">
            <span></span>
            <span></span>
            <span></span>

        <nav class="header-nav">
            <ul class="nav-list">
                <li><a href="../index.html">Home</a></li>
                <li><a href="../pages/galery.html">Galery</a></li>

<!--FORMULARIO-->
        <div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-12 col-lg-10">
            
            <div class="row form-container g-0">
                
                <div class="col-12 col-md-5 d-flex align-items-stretch">
                    <div class="bg-image-side w-100"></div>
                    <img src="../assets/c1.webp" alt="mano sosteniendo perfume" class="bg-image-side w-100">
                </div>

                <div class="col-12 col-md-7 p-4 p-sm-5">
                    <div class="mb-4">
                        <h2 class="fw-bold text-dark">Contact us!</h2>
                        <p class="text-muted small">Leave all your concerns down bellow</p>
                    </div>

                    <form>
                        <div class="row g-3 mb-3">
                            <div class="col-sm-6">
                                <label for="firstName" class="form-label small fw-semibold">Name</label>
                                <input type="text" class="form-control bg-light border-0 py-2" id="firstName" placeholder="Ej. Tomas" required>
                            </div>
                            <div class="col-sm-6">
                                <label for="lastName" class="form-label small fw-semibold">Surname</label>
                                <input type="text" class="form-control bg-light border-0 py-2" id="lastName" placeholder="Ej. Bale">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="email" class="form-label small fw-semibold">E-mail</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-0 text-muted"><i class="bi bi-envelope"></i></span>
                                <input type="email" class="form-control bg-light border-0 py-2" id="email" placeholder="name@gmail.com" required>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="comments" class="form-label small fw-semibold">Share your thoughts</label>
                            <textarea class="form-control bg-light border-0 py-2" id="comments" rows="5" placeholder="Write your experience or comments...." required></textarea>
                        </div>

                        <button type="submit" class="btn btn-outline-primary w-100 py-2 fw-bold rounded-3 shadow-sm" class="boton">Send</button>
                    </form>
                </div>

            </div> </div>
    </div>
</div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

        <div class="footer-left">
            <ul class="footer-links">
                <li><a href="#">Terms and Conditions</a></li>
                <li><a href="#">Privacy Policy</a></li>
                <li><a href="#">Support</a></li>
            </ul>
        </div>
        <div class="footer-right">
            <a href="https://www.facebook.com" class="social-icon" aria-label="Facebook" target="_blank"><i class="fab fa-facebook"><img src="../logos/facebook.png" alt="logo de facebook" class="footer-img"></i></a>
            <a href="https://www.x.com/" class="social-icon" aria-label="Twitter" target="_blank"><i class="fab fa-twitter"><img src="../logos/x.png" alt="logo de x" class="footer-img"></i></a>
            <a href="https://www.instagram.com/" class="social-icon" aria-label="Instagram" target="_blank"><i class="fab fa-instagram"><img src="../logos/instagram.png" alt="logo de instagram" class="footer-img"></i></a>
        </div>
    </footer>
    
    <script>
    const menuToggle = document.querySelector('.menu-toggle');
    const headerNav = document.querySelector('.header-nav');

    menuToggle.addEventListener('click', () => {
        menuToggle.classList.toggle('active');
        headerNav.classList.toggle('active');
    });
    </script>
</body>
